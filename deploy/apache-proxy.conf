# Save these two files on the VPS (they're already installed if you followed
# earlier setup). Kept in repo for reference and disaster recovery.
#
# Path: /etc/apache2/conf.d/userdata/std/2_4/wwwdfootdigi/reports.digital-footprints.co.uk/proxy.conf
# Path: /etc/apache2/conf.d/userdata/ssl/2_4/wwwdfootdigi/reports.digital-footprints.co.uk/proxy.conf
#
# After changing: /scripts/ensure_vhost_includes --user=wwwdfootdigi
#                 /scripts/rebuildhttpdconf
#                 systemctl restart httpd

ProxyPass /vivogaming/ !
ProxyPass /.well-known/ !
ProxyPass /static/ http://127.0.0.1:8001/static/
ProxyPassReverse /static/ http://127.0.0.1:8001/static/
ProxyPreserveHost On
ProxyPass / http://127.0.0.1:8001/
ProxyPassReverse / http://127.0.0.1:8001/
RequestHeader set X-Forwarded-Proto "https"
RequestHeader set X-Forwarded-Host "reports.digital-footprints.co.uk"
