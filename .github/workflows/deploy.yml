name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload changed files over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: /home/wwwdfootdigi/apps/reporting/
          exclude: |
            **/.git*
            **/.git*/**
            **/venv/**
            **/__pycache__/**
            **/*.pyc
            .env
            reporting.db
            data/**
            reports_out/**

      - name: Restart service via webhook
        run: |
          curl -sf "https://digital-footprints.co.uk/deploy-restart.php?token=${{ secrets.DEPLOY_WEBHOOK_TOKEN }}" \
            || (echo "Restart webhook failed" && exit 1)
