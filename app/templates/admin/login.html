<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — Digital Footprints Reporting</title>
<link rel="stylesheet" href="/static/css/brand.css">
<link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="login">
  <div class="login__brand">
    <svg class="login__chevrons" width="320" height="220" viewBox="0 0 320 220" fill="#fff" aria-hidden="true">
      <polygon points="40,0 90,0 -10,220 -60,220"/>
      <polygon points="120,0 170,0 70,220 20,220"/>
      <polygon points="200,0 250,0 150,220 100,220"/>
      <polygon points="280,0 330,0 230,220 180,220"/>
    </svg>
    <div class="login__mark">
      <span class="dot">
        <svg width="17" height="17" viewBox="0 0 22 22" aria-hidden="true">
          <path d="M2 9 L11 2 L20 9 L17 9 L11 5 L5 9 Z" fill="#fff"/>
          <path d="M2 16 L11 9 L20 16 L17 16 L11 12 L5 16 Z" fill="#fff"/>
        </svg>
      </span>
      <span>DIGITAL <span class="accent">FOOTPRINTS</span></span>
    </div>

    <div class="login__lead">Reporting,<br>the way it should <span class="teal">look</span>.</div>
    <p class="login__sub">Branded monthly PR and growth reports for every client. Upload, review, publish, share.</p>
    <div class="login__foot">REPORTING PLATFORM · ADMIN</div>
  </div>

  <div class="login__panel">
    <div class="login__form">
      <h1>Sign in</h1>
      <div class="muted">Enter your admin credentials to continue.</div>
      {% if error %}<div class="flash flash--err">{{ error }}</div>{% endif %}
      <form method="post" action="/admin/login">
        <div class="field">
          <label>Username</label>
          <input name="username" required autofocus>
        </div>
        <div class="field">
          <label>Password</label>
          <input name="password" type="password" required>
        </div>
        <button class="button button--primary" type="submit" style="width:100%;justify-content:center;margin-top:8px;">Sign in</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
