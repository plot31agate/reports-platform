<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Admin — Digital Footprints{% endblock %}</title>
<link rel="stylesheet" href="/static/css/brand.css?v={{ static_v }}">
<link rel="stylesheet" href="/static/css/admin.css?v={{ static_v }}">
{% block head_extra %}{% endblock %}
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="side__brand">
      <img class="side__logo" src="/static/img/df-logo-white.png" alt="Digital Footprints">
    </div>

    <div class="side__section">Workspace</div>
    <a class="side__link {% if active == 'dashboard' %}side__link--active{% endif %}" href="/admin">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
      Dashboard
    </a>
    <a class="side__link {% if active == 'workspace' %}side__link--active{% endif %}" href="/admin/workspace">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 16V4M12 4l-4 4M12 4l4 4"/><path d="M4 16v3a1 1 0 001 1h14a1 1 0 001-1v-3"/></svg>
      Workspace
    </a>
    <a class="side__link {% if active == 'client_settings' %}side__link--active{% endif %}" href="/admin/client-settings{% if active_client %}?client={{ active_client }}{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33h.01a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51h.01a1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82v.01a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Client settings
    </a>
    <a class="side__link {% if active == 'portal' %}side__link--active{% endif %}" href="/admin/portal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      Portal access
    </a>
    <a class="side__link {% if active == 'keys' %}side__link--active{% endif %}" href="/admin/keys">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="15" r="4"/><path d="M10.9 12.1L21 2M15 8l3 3M18 5l2 2"/></svg>
      API keys
    </a>
    <a class="side__link {% if active == 'how_it_works' %}side__link--active{% endif %}" href="/admin/how-it-works">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 015 .3c0 1.7-2.5 2.2-2.5 3.7"/><path d="M12 17h.01"/></svg>
      How reports work
    </a>

    <div class="side__section">Clients</div>
    {% for c in nav_clients or [] %}
    <a class="side__link {% if active_client == c.slug %}side__link--active{% endif %}" href="/admin/workspace?client={{ c.slug }}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 016-6h4a6 6 0 016 6v1"/></svg>
      {{ c.display_name }}
    </a>
    {% endfor %}
    <a class="side__link {% if active == 'new_client' %}side__link--active{% endif %}" href="/admin/clients/new" style="color:rgba(255,255,255,0.55);">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Add client
    </a>

    <div class="side__spacer"></div>
    <div class="side__foot">
      <span class="side__user">Signed in</span>
      <a class="side__signout" href="/admin/logout">Sign out</a>
    </div>
  </aside>

  <main class="main">
    {% block main %}{% endblock %}
  </main>
</div>
{% block body_extra %}{% endblock %}
</body>
</html>
